name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run --with pytest python -m pytest -s tests/unit

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Build pinned Agent Zero image
        run: docker build -t bitwarden-agent-zero-ci -f ci/agent-zero.Dockerfile .
      - run: bash ci/run_agent_zero_integration.sh
        env:
          BITWARDEN_AGENT_ZERO_IMAGE: bitwarden-agent-zero-ci
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bitwarden-integration-artifacts
          path: artifacts/
